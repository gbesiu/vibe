name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    name: Typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
